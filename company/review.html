  }
];

let currentIndex = 0;
const sldr = document.getElementById("reviewSlider");

function renderSlide() {
  const item = reviews[currentIndex];

  sldr.innerHTML = `
    <div class="w-[40%] pt-4">
      <div class="text-[70px] leading-none text-white/80 font-serif">“</div>

      <h2 class="text-[24px] font-medium text-black leading-[1.3]">
        ${item.title}
      </h2>

      <p class="mt-12 text-[18px] tracking-[0.024rem] text-black leading-[1.6]">
        ${item.text}
      </p>
    </div>

    <div class="w-[60%]">
      <div class="flex items-start justify-between mb-8">
        <div>
          <p class="text-[16px] font-medium text-black leading-tight">
            ${item.subtitle}
          </p>
          <p class="mt-1 text-[14px] text-gray-500 leading-tight">
            ${item.info}
          </p>
        </div>

        <div class="text-[26px] font-medium text-black">
          ${item.id}
          <span class="text-gray-500">/ ${reviews.length}</span>
        </div>
      </div>

      <div class="group relative overflow-hidden">
        <img 
          src="${item.img}" 
          alt="${item.title}"
          class="w-full h-120 object-cover block"
        >

        <button
          onclick="prevSlide()"
          class="absolute left-8 top-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-[#ccfe0f] flex items-center justify-center text-[22px] text-black transition duration-300 cursor-pointer ${currentIndex === 0 ? 'opacity-30 cursor-not-allowed' : 'opacity-0 group-hover:opacity-100'}"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <button
          onclick="nextSlide()"
          class="absolute right-8 top-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-[#ccfe0f] flex items-center justify-center text-[22px] text-black transition duration-300 cursor-pointer ${currentIndex === reviews.length - 1 ? 'opacity-30 cursor-not-allowed' : 'opacity-0 group-hover:opacity-100'}"
        >
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </div>
  `;
}

function nextSlide() {
  if (currentIndex < reviews.length - 1) {
    currentIndex = currentIndex + 1;
    renderSlide();
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex = currentIndex - 1;
    renderSlide();
  }
}

renderSlide();
  </script>
